<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Вход / Регистрация · Slip_Star</title>
    <link rel="stylesheet" href="style.css">
    <style>
        .auth-container {
            max-width: 500px;
            margin: 60px auto;
            padding: 40px;
            background: linear-gradient(145deg, rgba(20, 20, 35, 0.9), rgba(10, 10, 20, 0.95));
            border: 1px solid rgba(0, 255, 200, 0.08);
            border-radius: 30px;
            position: relative;
            z-index: 1;
        }

        .auth-container h1 {
            font-size: 2rem;
            background: linear-gradient(135deg, #00ffc8, #ff00c8);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            text-align: center;
            margin-bottom: 30px;
        }

        .auth-tabs {
            display: flex;
            gap: 10px;
            margin-bottom: 30px;
        }

        .auth-tabs button {
            flex: 1;
            padding: 12px;
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(0, 255, 200, 0.06);
            border-radius: 12px;
            color: #667788;
            cursor: pointer;
            transition: 0.3s;
            font-family: inherit;
            font-size: 1rem;
        }

        .auth-tabs button.active {
            border-color: #00ffc8;
            color: #00ffc8;
            background: rgba(0, 255, 200, 0.05);
        }

        .auth-tabs button:hover {
            border-color: rgba(0, 255, 200, 0.2);
        }

        .auth-form {
            display: none;
        }

        .auth-form.active {
            display: block;
            animation: fadeIn 0.3s ease;
        }

        @keyframes fadeIn {
            0% { opacity: 0; transform: translateY(10px); }
            100% { opacity: 1; transform: translateY(0); }
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            color: #8899aa;
            font-size: 0.85rem;
            margin-bottom: 6px;
        }

        .form-group input {
            width: 100%;
            padding: 12px 16px;
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(0, 255, 200, 0.08);
            border-radius: 12px;
            color: #ccddee;
            font-size: 1rem;
            font-family: inherit;
            transition: 0.3s;
            outline: none;
        }

        .form-group input:focus {
            border-color: #00ffc8;
            box-shadow: 0 0 20px rgba(0, 255, 200, 0.05);
        }

        .form-group input::placeholder {
            color: #445566;
        }

        .submit-btn {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, #00ffc8, #00ccaa);
            color: #0a0a0f;
            border: none;
            border-radius: 30px;
            font-size: 1.1rem;
            font-weight: 700;
            font-family: inherit;
            cursor: pointer;
            transition: 0.3s;
        }

        .submit-btn:hover {
            transform: scale(1.02);
            box-shadow: 0 0 40px rgba(0, 255, 200, 0.2);
        }

        .submit-btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none;
        }

        .message {
            margin-top: 15px;
            padding: 12px;
            border-radius: 12px;
            text-align: center;
            display: none;
        }

        .message.success {
            display: block;
            background: rgba(0, 255, 200, 0.08);
            color: #00ffc8;
            border: 1px solid rgba(0, 255, 200, 0.1);
        }

        .message.error {
            display: block;
            background: rgba(255, 0, 100, 0.08);
            color: #ff4466;
            border: 1px solid rgba(255, 0, 100, 0.1);
        }

        .back-link {
            display: inline-block;
            color: #00ffc8;
            text-decoration: none;
            margin-bottom: 20px;
            transition: 0.3s;
            font-size: 0.9rem;
        }

        .back-link:hover {
            color: #ff00c8;
            transform: translateX(-5px);
        }

        .user-info {
            text-align: center;
            padding: 20px;
            background: rgba(0, 255, 200, 0.05);
            border-radius: 12px;
            border: 1px solid rgba(0, 255, 200, 0.1);
        }

        .user-info .username {
            font-size: 1.5rem;
            color: #00ffc8;
        }

        .user-info .email {
            color: #667788;
            font-size: 0.9rem;
        }

        .logout-link {
            display: inline-block;
            margin-top: 15px;
            padding: 8px 20px;
            background: rgba(255, 0, 100, 0.1);
            color: #ff4466;
            border: 1px solid rgba(255, 0, 100, 0.2);
            border-radius: 30px;
            text-decoration: none;
            transition: 0.3s;
        }

        .logout-link:hover {
            background: rgba(255, 0, 100, 0.2);
        }

        .password-hint {
            color: #445566;
            font-size: 0.7rem;
            margin-top: 5px;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="auth-container">
            <a href="index.html" class="back-link">← Вернуться</a>
            <h1>🔐 Вход в систему</h1>

            <!-- Вкладки -->
            <div class="auth-tabs">
                <button class="active" data-tab="login">Вход</button>
                <button data-tab="register">Регистрация</button>
            </div>

            <!-- Форма входа -->
            <div class="auth-form active" id="loginForm">
                <form id="loginFormElement">
                    <div class="form-group">
                        <label for="loginUsername">Имя пользователя или Email</label>
                        <input type="text" id="loginUsername" placeholder="username или email@mail.ru" required>
                    </div>
                    <div class="form-group">
                        <label for="loginPassword">Пароль</label>
                        <input type="password" id="loginPassword" placeholder="Введите пароль" required>
                    </div>
                    <button type="submit" class="submit-btn">🚀 Войти</button>
                </form>
                <div class="message" id="loginMessage"></div>
            </div>

            <!-- Форма регистрации -->
            <div class="auth-form" id="registerForm">
                <form id="registerFormElement">
                    <div class="form-group">
                        <label for="regUsername">Имя пользователя</label>
                        <input type="text" id="regUsername" placeholder="от 3 до 30 символов" required>
                    </div>
                    <div class="form-group">
                        <label for="regEmail">Email</label>
                        <input type="email" id="regEmail" placeholder="your@email.ru" required>
                    </div>
                    <div class="form-group">
                        <label for="regPassword">Пароль</label>
                        <input type="password" id="regPassword" placeholder="минимум 6 символов" required>
                        <div class="password-hint">Пароль должен содержать минимум 6 символов</div>
                    </div>
                    <button type="submit" class="submit-btn">🚀 Зарегистрироваться</button>
                </form>
                <div class="message" id="registerMessage"></div>
            </div>

            <!-- Информация о пользователе (скрыта по умолчанию) -->
            <div id="userInfo" style="display: none;">
                <div class="user-info">
                    <div>👋 Добро пожаловать,</div>
                    <div class="username" id="userNameDisplay"></div>
                    <div class="email" id="userEmailDisplay"></div>
                    <a href="logout.php" class="logout-link">🚪 Выйти</a>
                </div>
            </div>
        </div>
    </div>

    <script>
        // ===== ПЕРЕКЛЮЧЕНИЕ ВКЛАДОК =====
        document.querySelectorAll('.auth-tabs button').forEach(btn => {
            btn.addEventListener('click', function() {
                document.querySelectorAll('.auth-tabs button').forEach(b => b.classList.remove('active'));
                this.classList.add('active');

                const tab = this.dataset.tab;
                document.querySelectorAll('.auth-form').forEach(form => form.classList.remove('active'));
                document.getElementById(tab + 'Form').classList.add('active');

                // Скрываем сообщения
                document.querySelectorAll('.message').forEach(m => {
                    m.className = 'message';
                    m.style.display = 'none';
                });
            });
        });

        // ===== РЕГИСТРАЦИЯ =====
        document.getElementById('registerFormElement').addEventListener('submit', async function(e) {
            e.preventDefault();

            const submitBtn = this.querySelector('.submit-btn');
            const message = document.getElementById('registerMessage');

            submitBtn.disabled = true;
            submitBtn.textContent = '⏳ Регистрация...';

            const data = {
                username: document.getElementById('regUsername').value.trim(),
                email: document.getElementById('regEmail').value.trim(),
                password: document.getElementById('regPassword').value
            };

            try {
                const response = await fetch('register.php', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(data)
                });

                const result = await response.json();

                message.className = 'message ' + (result.success ? 'success' : 'error');
                message.textContent = result.message;
                message.style.display = 'block';

                if (result.success) {
                    // Очищаем форму
                    this.reset();
                    // Переключаем на вкладку входа
                    document.querySelector('[data-tab="login"]').click();
                }

            } catch (error) {
                message.className = 'message error';
                message.textContent = 'Ошибка: ' + error.message;
                message.style.display = 'block';
            } finally {
                submitBtn.disabled = false;
                submitBtn.textContent = '🚀 Зарегистрироваться';
            }
        });

        // ===== ВХОД =====
        document.getElementById('loginFormElement').addEventListener('submit', async function(e) {
            e.preventDefault();

            const submitBtn = this.querySelector('.submit-btn');
            const message = document.getElementById('loginMessage');

            submitBtn.disabled = true;
            submitBtn.textContent = '⏳ Вход...';

            const data = {
                login: document.getElementById('loginUsername').value.trim(),
                password: document.getElementById('loginPassword').value
            };

            try {
                const response = await fetch('login.php', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(data)
                });

                const result = await response.json();

                message.className = 'message ' + (result.success ? 'success' : 'error');
                message.textContent = result.message;
                message.style.display = 'block';

                if (result.success) {
                    // Показываем информацию о пользователе
                    document.querySelector('.auth-tabs').style.display = 'none';
                    document.querySelectorAll('.auth-form').forEach(f => f.style.display = 'none');
                    document.getElementById('userInfo').style.display = 'block';
                    document.getElementById('userNameDisplay').textContent = result.user.username;
                    document.getElementById('userEmailDisplay').textContent = result.user.email;
                }

            } catch (error) {
                message.className = 'message error';
                message.textContent = 'Ошибка: ' + error.message;
                message.style.display = 'block';
            } finally {
                submitBtn.disabled = false;
                submitBtn.textContent = '🚀 Войти';
            }
        });

        // ===== ПРОВЕРКА СТАТУСА ПРИ ЗАГРУЗКЕ =====
        async function checkAuth() {
            try {
                const response = await fetch('check-auth.php');
                const result = await response.json();

                if (result.loggedIn) {
                    document.querySelector('.auth-tabs').style.display = 'none';
                    document.querySelectorAll('.auth-form').forEach(f => f.style.display = 'none');
                    document.getElementById('userInfo').style.display = 'block';
                    document.getElementById('userNameDisplay').textContent = result.user.username;
                    document.getElementById('userEmailDisplay').textContent = result.user.email;
                }
            } catch (error) {
                console.error('Ошибка проверки авторизации:', error);
            }
        }

        checkAuth();

        console.log('%c🔐 Система авторизации загружена', 'color:#00ffc8; font-size:16px;');
    </script>
</body>
</html>
